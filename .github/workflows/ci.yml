name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall -q .

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
        env:
          # CI environment — use safe test defaults
          MOCK_MODE: "true"
          ALLOW_MOCK_ON_RENDER: "true"
          DB_PATH: ":memory:"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          TELEGRAM_BOT_TOKEN: "test_token_ci"
          ODDS_API_KEY: "test_key_ci"
          ALLSPORTS_API_KEY: "test_key_ci"
          UPI_ID: "test@upi"
