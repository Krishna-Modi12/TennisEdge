name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tennisedge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tennisedge_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall -q .

      - name: Initialize DB
        run: PGPASSWORD=postgres psql -U postgres -h localhost -d tennisedge_test -f database/schema.sql

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
        env:
          # CI environment — use safe test defaults
          MOCK_MODE: "true"
          ALLOW_MOCK_ON_RENDER: "true"
          DB_PATH: ":memory:"
          TELEGRAM_BOT_TOKEN: "test_token_ci"
          ODDS_API_KEY: "test_key_ci"
          ALLSPORTS_API_KEY: "test_key_ci"
          UPI_ID: "test@upi"
